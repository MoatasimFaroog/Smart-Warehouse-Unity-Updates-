name: Build Android APK

on:
  push:
    branches:
      - main
      - claude/setup-android-emulator-SLSGn
  workflow_dispatch:

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # ── 2. Cache Unity Library ────────────────────────────────────────
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Android-
            Library-

      # ── 3. Build with GameCI ──────────────────────────────────────────
      - name: Build Android APK
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:   ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 2022.3.22f1
          targetPlatform: Android
          buildName: NomadGo-SpatialVision
          buildsPath: Builds
          buildMethod: NomadGo.Editor.BuildScript.BuildAndroid
          androidExportType: androidPackage
          androidSymbolType: none

      # ── 4. Upload APK artifact ────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NomadGo-SpatialVision-APK
          path: Builds/Android/*.apk
          retention-days: 7
