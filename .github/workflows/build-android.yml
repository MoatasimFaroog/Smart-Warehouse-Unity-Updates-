name: Build Android APK

on:
  push:
    branches:
      - main
      - claude/setup-android-emulator-SLSGn
  workflow_dispatch:

# Required secrets (add in GitHub → Settings → Secrets → Actions):
#   UNITY_EMAIL     → your Unity account email
#   UNITY_PASSWORD  → your Unity account password
#   UNITY_LICENSE   → contents of .ulf file (Pro/Plus only; leave empty for Personal)

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # -- 0. Add swap space (Unity builds need extra memory) ------------
      - name: Add swap space
        run: |
          sudo swapoff -a
          sudo fallocate -l 8G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          free -h

      # -- 1. Checkout --------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      # -- 2. Cache Unity Library ---------------------------------------
      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Android-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-Android-
            Library-

      # -- 3. Build with GameCI -----------------------------------------
      # Personal license: only UNITY_EMAIL + UNITY_PASSWORD needed.
      # UNITY_LICENSE (the .ulf file) is intentionally omitted here because
      # a Windows-generated .ulf will not activate on a Linux runner.
      - name: Build Android APK
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 2022.3.22f1
          targetPlatform: Android
          buildName: NomadGo-SpatialVision
          buildsPath: Builds
          androidExportType: androidPackage
          androidSymbolType: none

      # -- 4. Upload APK artifact ---------------------------------------
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NomadGo-SpatialVision-APK
          path: Builds/Android/*.apk
          retention-days: 7
