name: Verify Unity Credentials

on:
  workflow_dispatch:

# Run this workflow FIRST to confirm your Unity credentials work.
# Required secrets: UNITY_EMAIL, UNITY_PASSWORD
# Optional secret:  UNITY_LICENSE (only needed for Pro/Plus licenses)

jobs:
  verify:
    name: Verify Unity login
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Activate Unity (Personal license)
        uses: game-ci/unity-activate@v4
        env:
          UNITY_LICENSE:  ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL:    ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 2022.3.22f1

      - name: Return Unity license
        uses: game-ci/unity-return-license@v4
        if: always()
